<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>اختبار أسلوب الشرط والتوكيد</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --light-bg-1:#fff7ed;
      --light-bg-2:#ffffff;
      --light-main:#f97316;
      --light-main-2:#fb923c;
      --light-card:rgba(255,255,255,.95);
      --light-text:#2b2b2b;
      --light-sub:#7c4a1d;
      --light-border:rgba(249,115,22,.16);

      --dark-bg-1:#0f172a;
      --dark-bg-2:#0b1f35;
      --dark-main:#0f766e;
      --dark-main-2:#14532d;
      --dark-card:rgba(9,18,35,.9);
      --dark-text:#f8fafc;
      --dark-sub:#b8d6d0;
      --dark-border:rgba(16,185,129,.16);
    }

    body{
      font-family:Tahoma,Arial,sans-serif;
      color:var(--light-text);
      min-height:100vh;
      background:linear-gradient(135deg,var(--light-bg-1),var(--light-bg-2));
      transition:.35s;
      padding:20px;
    }

    body.dark{
      color:var(--dark-text);
      background:linear-gradient(135deg,var(--dark-bg-1),var(--dark-bg-2));
    }

    .container{
      width:min(950px,100%);
      margin:0 auto;
    }

    .topbar{
      background:linear-gradient(90deg,var(--light-main),var(--light-main-2));
      color:#fff;
      padding:18px;
      border-radius:24px;
      text-align:center;
      font-size:28px;
      font-weight:800;
      margin-bottom:20px;
    }

    body.dark .topbar{
      background:linear-gradient(90deg,var(--dark-main),var(--dark-main-2));
    }

    .card{
      background:var(--light-card);
      border:1px solid var(--light-border);
      border-radius:24px;
      padding:22px;
      margin-bottom:18px;
    }

    body.dark .card{
      background:var(--dark-card);
      border-color:var(--dark-border);
    }

    .question{
      margin-bottom:20px;
      padding-bottom:18px;
      border-bottom:1px solid rgba(0,0,0,.08);
    }

    body.dark .question{
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .question p{
      font-size:19px;
      font-weight:700;
      margin-bottom:10px;
    }

    label{
      display:block;
      margin:8px 0;
      font-size:17px;
      cursor:pointer;
    }

    .back{
      border:none;
      cursor:pointer;
      padding:14px
